<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="description" content="iPromo 3D Product Configurator — Generate photorealistic 3D mockups with your logo from any iPromo product URL." />

    <!-- Open Graph (for shareable link previews) -->
    <meta property="og:title" content="iPromo 3D Product Configurator" />
    <meta property="og:description" content="Interactive 3D mockups with custom logo, live color switching, and instant sharing." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>iPromo 3D Configurator</title>

    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0f0f1a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

      /* Range input styling */
      input[type="range"] {
        -webkit-appearance: none;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 99px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #6366f1;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 6px rgba(99,102,241,0.5);
      }

      /* Prevent text selection during 3D drag */
      canvas { user-select: none; display: block; }

      /* Smooth transitions everywhere */
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <noscript>JavaScript is required to run the iPromo 3D Configurator.</noscript>
    <div id="root"></div>
  </body>
</html>
